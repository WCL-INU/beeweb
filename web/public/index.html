<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Main</title>

    <!-- 맨 앞 슬래시(/) 제거: 로컬(상대) 경로로 -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="account/css/header_login.css">
</head>

<body>
    <!-- Header -->
    <div class="header">
        <h1>Smart Hive State Viewer</h1>
        <div class="user-info" style="position: absolute; top: 10px; right: 10px;"></div>
    </div>

    <!-- Button Container -->
    <div class="container">
        <div class="button-container">
            <!-- 맨 앞 슬래시(/) 제거: 현재 경로를 기준으로 이동 -->
            <button onclick="location.href='hiveView'">Hive View</button>
            <button onclick="location.href='compareView'">Compare View</button>
        </div>
        <div class="button-container">
            <button onclick="location.href='pictureView'">Picture View</button>
            <div class="empty-button"></div>
        </div>
        <div class="button-container">
            <button onclick="location.href='exportView'">Export Data</button>
            <button onclick="location.href='managementView'">Management</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Wireless Communication LAB, Dept of Embedded System Engineering, Incheon National University</p>
    </div>

    <!-- 스크립트 경로도 상대 경로로 -->
    <script src="scripts/header.js"></script>
</body>

</html>
